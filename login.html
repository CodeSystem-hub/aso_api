<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema ASO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">

<div class="container">
  <div class="login-box">
    <h2>Login</h2>
    <p>Sistema de Integração ASO</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="usuario" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" required>
      </div>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
