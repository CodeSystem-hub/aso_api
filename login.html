<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login - Sistema ASO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">

<div class="container">
  <div class="login-box">
    <h2>Login</h2>
    <p>Sistema de Integração ASO</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Usuário</label>
        <input type="text" id="usuario" required>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="senha" required>
      </div>

      <div class="input-group">
        <label>Ambiente</label>
        <label class="toggle">
          <input type="checkbox" id="envToggle">
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
          <span id="envLabel" class="meta">Produção</span>
        </label>
      </div>

      <div class="input-group hidden" id="testApiBaseUrlGroup">
        <label>RM Base Teste (URL)</label>
        <input type="text" id="apiBaseUrlTestInput" placeholder="https://...:2051/...">
        <div class="meta">Opcional. Se vazio, usa o padrão automático.</div>
      </div>

      <button type="submit">Entrar</button>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<footer class="app-footer app-footer--fixed">© 2026 { CodeSystemHub } - código que conecta ideias e resultados.</footer>

<script src="script.js"></script>
</body>
</html>
